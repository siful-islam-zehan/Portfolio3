```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Projects</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
    }

    .topbar {
      padding: 20px;
      border-bottom: 1px solid #eee;
      font-size: 24px;
      font-weight: 700;
    }

    .projects-wrap {
      max-width: 1200px;

    .projects {

      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 24px;
    }

    .project {
      padding: 10px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      background: #fff;

      flex-shrink: 0;
    }

    .project.active {
      background: #111;

    .preview-card {
      border: 1px solid #eee;

    }

    .preview-image-wrap {

      background: #f3f3f3;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .preview-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #f8f8f8;
    }

    .preview-meta {
      padding: 18px;

    .preview-title {
      font-size: 24px;

    .controls {

    button {
      padding: 10px 16px;

</head>
<body>

  <div class="topbar">My Projects</div>

  <div class="projects-wrap">
    <div class="projects" id="projects"></div>

    <div class="preview-card">
      <div class="preview-image-wrap">
        <img id="previewImg" src="" alt="Project Preview">
      </div>

      <div class="preview-meta">
        <div class="preview-title" id="previewTitle">Project Title</div>
        <div class="preview-tag" id="previewTag">Project Tag</div>
        <div class="preview-desc" id="previewDesc">Project description will show here.</div>

        <div class="controls">
          <button class="secondary" onclick="prevProject()">Prev</button>
          <button class="secondary" onclick="nextProject()">Next</button>
          <button onclick="openModal()">View Full Project</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle">Project Title</h2>
        <button class="modal-close" onclick="closeModal()">Close</button>
      </div>

      <div class="modal-body">
        <p class="modal-desc" id="modalDesc"></p>

        <div class="scroll-viewer" id="scrollViewer">
          <img id="fullProjectImg" src="" alt="Full Project Design">
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    let projects = [];
    let current = 0;

    function init() {
      if (typeof DB === 'undefined') {
        alert('data.js load hoy nai');
        return;
      }

      DB.init();
      projects = DB.get('projects') || [];

      renderList();

      if (projects.length > 0) {
        showProject(0);
      } else {
        showEmptyState();
      }
    }

    function showEmptyState() {
      document.getElementById('projects').innerHTML = '<div class="empty-state">No projects added yet.</div>';
      document.getElementById('previewTitle').textContent = 'No project found';
      document.getElementById('previewTag').textContent = '';
      document.getElementById('previewDesc').textContent = 'Please add a project from admin panel.';
      document.getElementById('previewImg').src = '';
    }

    function renderList() {
      const el = document.getElementById('projects');

      if (!projects.length) {
        el.innerHTML = '';
        return;
      }

      el.innerHTML = projects.map((p, i) => `
        <div class="project ${i === current ? 'active' : ''}" onclick="showProject(${i})">
          ${p.name || 'Untitled'}
        </div>
      `).join('');
    }

    function showProject(i) {
      if (!projects.length) return;

      current = i;
      const p = projects[i];

      document.querySelectorAll('.project').forEach((el, idx) => {
        el.classList.toggle('active', idx === i);
      });

      document.getElementById('previewTitle').textContent = p.name || 'Untitled Project';
      document.getElementById('previewTag').textContent = p.tag || '';
      document.getElementById('previewDesc').textContent = p.desc || '';

      const previewImg = document.getElementById('previewImg');
      previewImg.src = p.banner || p.full || '';
    }

    function nextProject() {
      if (!projects.length) return;
      current = (current + 1) % projects.length;
      showProject(current);
    }

    function prevProject() {
      if (!projects.length) return;
      current = (current - 1 + projects.length) % projects.length;
      showProject(current);
    }

    function openModal() {
      if (!projects.length) return;

      const p = projects[current];
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';

      document.getElementById('modalTitle').textContent = p.name || 'Untitled Project';
      document.getElementById('modalDesc').textContent = p.fulldesc || p.desc || '';

      const fullImg = document.getElementById('fullProjectImg');
      fullImg.src = p.full || p.banner || '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    window.addEventListener('storage', () => {
      projects = DB.get('projects') || [];
      renderList();
      if (projects.length > 0) {
        if (current >= projects.length) current = 0;
        showProject(current);
      } else {
        showEmptyState();
      }
    });

    window.addEventListener('pf-data-updated', () => {
      projects = DB.get('projects') || [];
      renderList();
      if (projects.length > 0) {
        if (current >= projects.length) current = 0;
        showProject(current);
      } else {
        showEmptyState();
      }
    });

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
