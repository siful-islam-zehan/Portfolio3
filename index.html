<script>
const BG_COLORS = ['#f0f4ff','#f0fff8','#fff8f0','#fff0f4','#f5f0ff','#fafaf0','#e8f4ff'];
let activeProjectIdx = 0;
let allProjects = [];

function applySettings() {
  const s = DB.get('settings');
  const c = DB.get('contact');

  const statusMap = {
    open: 'Open to opportunities',
    freelance: 'Available for freelance',
    busy: 'Not available right now'
  };

  const statusLabel = document.getElementById('status-label');
  const heroTag = document.getElementById('hero-tag');
  const ciEmail = document.getElementById('ci-email');
  const ciLocation = document.getElementById('ci-location');
  const slLinkedin = document.getElementById('sl-linkedin');
  const slGithub = document.getElementById('sl-github');
  const slDribbble = document.getElementById('sl-dribbble');
  const slBehance = document.getElementById('sl-behance');

  if (statusLabel) statusLabel.textContent = statusMap[s.status] || 'Open to opportunities';
  if (heroTag) heroTag.textContent = s.heroTag || 'Available for freelance work';
  if (ciEmail) ciEmail.textContent = c.email || 'sifulislamzehan@gmail.com';
  if (ciLocation) ciLocation.textContent = (c.location || 'Bangladesh') + ' 🇧🇩';

  if (slLinkedin) slLinkedin.href = c.linkedin || '#';
  if (slGithub) slGithub.href = c.github || '#';
  if (slDribbble) slDribbble.href = c.dribbble || '#';
  if (slBehance) slBehance.href = c.behance || '#';
}

function renderProjects() {
  allProjects = DB.get('projects');
  const list = document.getElementById('projects-list');

  if (!list) return;

  if (!allProjects || allProjects.length === 0) {
    list.innerHTML = '<div style="padding:2rem;color:var(--gray-light);font-size:.875rem">No projects yet.</div>';
    return;
  }

  list.innerHTML = allProjects.map((p, i) => `
    <div class="project-item ${i === 0 ? 'active' : ''}" data-index="${i}"
         onclick="selectProject(${i}); openProjectModal(${i});">
      <div class="project-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="project-name">${p.name}</div>
      <div class="project-tagline">${p.tag}</div>
    </div>
  `).join('');

  list.querySelectorAll('.project-item').forEach((el, i) => {
    el.addEventListener('mouseenter', () => selectProject(i));
  });

  selectProject(0, true);
}

function selectProject(idx, silent = false) {
  allProjects = DB.get('projects');

  document.querySelectorAll('.project-item').forEach(el => el.classList.remove('active'));

  const item = document.querySelector(`.project-item[data-index="${idx}"]`);
  if (item) item.classList.add('active');

  activeProjectIdx = idx;
  const p = allProjects[idx];
  if (!p) return;

  const bg = BG_COLORS[idx % BG_COLORS.length];
  const bannerImg = document.getElementById('preview-banner');
  const placeholder = document.getElementById('preview-placeholder');
  const previewLabel = document.getElementById('preview-label');
  const previewMockup = document.getElementById('preview-mockup');
  const previewTitle = document.getElementById('preview-title');
  const previewTag = document.getElementById('preview-tag');

  if (p.banner) {
    bannerImg.src = p.banner;
    bannerImg.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    bannerImg.style.display = 'none';
    placeholder.style.display = 'flex';
    previewLabel.textContent = p.name;
  }

  previewMockup.style.background = p.banner ? '#000' : bg;
  previewTitle.textContent = p.name;
  previewTag.textContent = p.tag;

  if (!silent) {
    const card = document.querySelector('.preview-card');
    if (card) {
      card.style.transition = 'none';
      card.style.opacity = '0';
      card.style.transform = 'translateY(10px)';
      setTimeout(() => {
        card.style.transition = 'all .35s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 40);
    }
  }
}

function openProjectModal(idx) {
  allProjects = DB.get('projects');
  const p = allProjects[idx !== undefined ? idx : activeProjectIdx];
  if (!p) return;

  const bg = BG_COLORS[(idx !== undefined ? idx : activeProjectIdx) % BG_COLORS.length];
  const fullImg = document.getElementById('modal-full-img');
  const iconWrap = document.getElementById('modal-icon-wrap');
  const modalVisual = document.getElementById('modal-visual');

  modalVisual.style.background = bg;

  if (p.full) {
    fullImg.src = p.full;
    fullImg.style.display = 'block';
    iconWrap.style.display = 'none';
  } else if (p.banner) {
    fullImg.src = p.banner;
    fullImg.style.display = 'block';
    iconWrap.style.display = 'none';
  } else {
    fullImg.style.display = 'none';
    iconWrap.style.display = 'flex';
    document.getElementById('modal-label-text').textContent = p.name;
  }

  document.getElementById('modal-cat').textContent = p.category || p.tag;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-desc').textContent = p.fulldesc || p.desc;
  document.getElementById('modal-year').textContent = p.year || '—';
  document.getElementById('modal-role').textContent = p.role || '—';
  document.getElementById('modal-tools').textContent = p.tools || '—';

  const linkEl = document.getElementById('modal-link');
  if (p.link) {
    linkEl.href = p.link;
    linkEl.style.display = 'inline-flex';
  } else {
    linkEl.style.display = 'none';
  }

  document.getElementById('project-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeProjectModal() {
  document.getElementById('project-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderExperience() {
  const list = document.getElementById('exp-timeline');
  const data = DB.get('experience');
  if (!list) return;

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="timeline-empty">No experience added yet.</div>';
    return;
  }

  list.innerHTML = data.map(e => `
    <div class="timeline-item">
      <div class="timeline-dot-col">
        <div class="timeline-dot"></div>
        <div class="timeline-line"></div>
      </div>
      <div class="timeline-content">
        <div class="timeline-period">${e.start} — ${e.end}</div>
        <div class="timeline-title">${e.role}</div>
        <div class="timeline-subtitle">${e.company}</div>
        <span class="timeline-badge">${e.type}</span>
        ${e.desc ? `<div class="timeline-desc">${e.desc}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function renderEducation() {
  const list = document.getElementById('edu-timeline');
  const data = DB.get('education');
  if (!list) return;

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="timeline-empty">No education added yet.</div>';
    return;
  }

  list.innerHTML = data.map(e => `
    <div class="timeline-item">
      <div class="timeline-dot-col">
        <div class="timeline-dot"></div>
        <div class="timeline-line"></div>
      </div>
      <div class="timeline-content">
        <div class="timeline-period">${e.year || '—'}</div>
        <div class="timeline-title">${e.degree}</div>
        <div class="timeline-subtitle">${e.institution}</div>
        ${e.desc ? `<div class="timeline-desc">${e.desc}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const message = document.getElementById('f-msg').value.trim();
  const success = document.getElementById('form-success');

  if (!name || !email || !message) {
    alert('Please fill all fields');
    return;
  }

  const messages = DB.get('messages');
  messages.unshift({
    id: Date.now(),
    name,
    email,
    message,
    time: new Date().toLocaleString(),
    read: false
  });

  DB.set('messages', messages);

  document.getElementById('f-name').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-msg').value = '';

  if (success) {
    success.style.display = 'block';
    setTimeout(() => {
      success.style.display = 'none';
    }, 3000);
  }
}

function refreshPortfolio() {
  applySettings();
  renderProjects();
  renderExperience();
  renderEducation();
}

document.addEventListener('DOMContentLoaded', () => {
  DB.init();
  refreshPortfolio();
});

window.addEventListener('pf-data-updated', () => {
  refreshPortfolio();
});

window.addEventListener('storage', () => {
  refreshPortfolio();
});
</script>
